apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: allow-empty-test-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mthnmdn/kustomize.git
    targetRevision: HEAD 
    path: allow-empty-test
  destination:
    server: https://kubernetes.default.svc 
  syncPolicy:
    automated:
      prune: true
      allowEmpty: false
      selfHeal: true
